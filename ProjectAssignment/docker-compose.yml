version: '3.8'

services:
  app-db:
    build: ./database
    container_name: task_db_container
    environment:
      POSTGRES_USER: admin_user
      POSTGRES_PASSWORD: password_2026
      POSTGRES_DB: task_db
    volumes:
      - task_data:/var/lib/postgresql/data
    networks:
      app_vlan:
        ipv4_address: 192.168.20.10
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_user -d task_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app-backend:
    build: ./backend
    container_name: task_backend_container
    depends_on:
      app-db:
        condition: service_healthy
    environment:
      DB_HOST: 192.168.20.10
      DB_USER: admin_user
      DB_PASSWORD: password_2026
      DB_NAME: task_db
    networks:
      app_vlan:
        ipv4_address: 192.168.20.20

networks:
  app_vlan:
    external: true

volumes:
  task_data: